<!doctype html>
<html lang="pt-BR">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Minutei</title>
<link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #1f6d4c;
    --brand-dark: #14523a;
    --brand-soft: #eef4f0;
    --gold: #b08a3e;
    --ink: #1b1f27;
    --muted: #6b7280;
    --border: #e7e4dc;
    --bg: #faf9f6;
    --paper: #ffffff;
    --shadow-sm: 0 1px 2px rgba(20, 20, 15, 0.05);
    --shadow-md: 0 6px 20px rgba(20, 25, 20, 0.07);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--sans); margin: 0; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

  /* Brand lockup */
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .brand-mark { width: 30px; height: 30px; flex-shrink: 0; display: block; filter: drop-shadow(0 2px 6px rgba(20, 82, 58, 0.3)); }
  .brand-word { font-family: var(--serif); font-weight: 600; font-size: 19px; letter-spacing: 0.01em; color: var(--ink); }
  .auth-card .brand-mark { width: 38px; height: 38px; }
  .auth-card .brand-word { font-size: 23px; }

  header { background: var(--paper); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header .tenant-badge { font-size: 13px; color: var(--muted); display: flex; align-items: center; justify-content: flex-end; gap: 16px; min-width: 0; flex: 1; }
  header .tenant-badge span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  header .tenant-badge button { background: none; border: none; color: var(--muted); text-decoration: none; cursor: pointer; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: background .15s, color .15s; flex-shrink: 0; }
  header .tenant-badge button:hover { background: var(--bg); color: var(--ink); }

  nav { display: flex; gap: 4px; padding: 10px 28px; background: var(--paper); border-bottom: 1px solid var(--border); overflow-x: auto; }
  nav button { border: none; background: none; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--muted); transition: background .15s, color .15s; white-space: nowrap; flex-shrink: 0; }
  nav button:hover { color: var(--ink); }
  nav button.active { background: var(--brand-soft); color: var(--brand-dark); font-weight: 600; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    header .tenant-badge { font-size: 12px; max-width: 100%; }
    nav { padding: 8px 16px; }
    main { margin: 20px auto; padding: 0 14px 50px; }
    .card { padding: 20px; border-radius: 12px; }
    .grid, .grid.cols3 { grid-template-columns: 1fr; }
    .auth-card { width: 100%; padding: 28px 24px; }
  }

  main { max-width: 880px; margin: 32px auto; padding: 0 20px 70px; }
  .card { background: var(--paper); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 22px; box-shadow: var(--shadow-sm); }
  .card h2 { font-family: var(--serif); font-weight: 600; font-size: 18px; margin: 0 0 5px; letter-spacing: 0.01em; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin: 0 0 20px; line-height: 1.5; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 12px; font-weight: 600; color: #4b5058; margin-bottom: 6px; letter-spacing: 0.01em; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; background: var(--paper); color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31, 109, 76, 0.12); }
  textarea { resize: vertical; min-height: 50px; }
  .field { margin-bottom: 15px; }

  button { font-family: inherit; }
  button.primary {
    background: var(--brand); color: #fff; border: none; padding: 11px 24px; border-radius: 9px;
    font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(31, 109, 76, 0.25);
    transition: background .15s, box-shadow .15s, transform .1s;
  }
  button.primary:hover { background: var(--brand-dark); box-shadow: 0 3px 10px rgba(31, 109, 76, 0.32); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: .55; cursor: default; box-shadow: none; }
  button.secondary {
    background: var(--paper); border: 1px solid var(--border); padding: 10px 18px; border-radius: 9px;
    font-size: 13.5px; cursor: pointer; color: var(--ink); font-weight: 500; transition: border-color .15s, background .15s;
  }
  button.secondary:hover { border-color: #c9c5b9; background: var(--bg); }
  button.link { background: none; border: none; color: #a13a3a; font-size: 13px; cursor: pointer; text-decoration: underline; padding: 0; }

  .cnh-upload { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .cnh-upload-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px;
    border: 1px dashed var(--brand); color: var(--brand-dark); background: var(--brand-soft);
    font-size: 12.5px; font-weight: 600; cursor: pointer; transition: background .15s;
  }
  .cnh-upload-btn:hover { background: #e2ede6; }
  .cnh-upload-btn.loading { opacity: .6; cursor: default; }
  .cnh-status { font-size: 12px; color: var(--muted); }
  .cnh-status.error { color: #a13a3a; }
  .cnh-status.success { color: var(--brand-dark); }

  .row-list { display: flex; flex-direction: column; gap: 16px; }
  .person-card, .parcela-card { border: 1px dashed var(--border); border-radius: 10px; padding: 18px; position: relative; background: #fdfdfb; }
  .row-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

  .tabs-tipo { display: flex; gap: 10px; margin-bottom: 22px; }
  .tabs-tipo button {
    flex: 1; padding: 13px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--paper);
    cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all .15s;
  }
  .tabs-tipo button.active { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-soft); }

  .risk-badge { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .risk-badge::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .risk-badge.risk-baixo { background: #eaf4ee; color: #1f6d4c; }
  .risk-badge.risk-medio { background: #fbf0e0; color: #9a6a12; }
  .risk-badge.risk-alto { background: #fbe9e7; color: #b43d2f; }
  .ia-resultado { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .ia-resultado h3 { font-size: 14px; margin: 18px 0 8px; }
  .ia-justificativa { font-size: 14px; line-height: 1.55; color: var(--ink); }
  .ia-texto-sugerido { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .ia-disclaimer { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.5; }

  .layout-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
  .layout-picker button {
    text-align: left; padding: 13px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--paper);
    cursor: pointer; transition: all .15s;
  }
  .layout-picker button.active { border-color: var(--brand); background: var(--brand-soft); }
  .layout-picker .lp-name { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .layout-picker button.active .lp-name { color: var(--brand-dark); }
  .layout-picker .lp-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
  @media (max-width: 640px) { .layout-picker { grid-template-columns: 1fr; } }

  .section-title {
    font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .logo-preview { width: 64px; height: 64px; object-fit: contain; border: 1px solid var(--border); border-radius: 10px; padding: 6px; background: #fafafa; }
  .team-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; background: var(--paper); }
  .empty { color: var(--muted); font-size: 14px; padding: 24px; text-align: center; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: #fff; padding: 13px 20px;
    border-radius: 10px; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.22); opacity: 0;
    transform: translateY(10px); transition: all .25s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #942d2d; }
  .footer-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
  .error-msg { color: #a13a3a; font-size: 13px; margin-top: 8px; min-height: 16px; }

  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 15% 20%, rgba(31,109,76,0.06), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(176,138,62,0.07), transparent 45%),
      var(--bg);
  }
  .auth-card { width: 400px; background: var(--paper); border: 1px solid var(--border); border-radius: 16px; padding: 36px; box-shadow: var(--shadow-md); }
  .auth-card .brand { margin-bottom: 6px; }
  .auth-card .hint { font-size: 13.5px; color: var(--muted); margin: 0 0 24px; }
  .auth-switch { text-align: center; font-size: 13.5px; color: var(--muted); margin-top: 18px; }
  .auth-switch button { background: none; border: none; color: var(--brand); font-weight: 600; cursor: pointer; font-size: 13.5px; }
  .badge-role { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; background: var(--brand-soft); color: var(--brand-dark); border-radius: 5px; padding: 3px 8px; font-weight: 600; }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const PLANOS_PAGOS = { autonomo: { nome: "Autônomo", preco: "R$49/mês" }, imobiliaria: { nome: "Imobiliária", preco: "R$149/mês" } };

const state = {
  user: null,
  tenant: null,
  team: [],
  tipo: "compra_venda",
  layout: "padrao",
  authMode: "login", // login | signup
  pendingPlano: null,
};

const LAYOUTS_CONTRATO = [
  { id: "padrao", label: "Padrão", desc: "Visual limpo e funcional, com a cor da sua marca em destaque." },
  { id: "profissional", label: "Profissional", desc: "Tom jurídico clássico, tipografia serifada e tons de tinta." },
  { id: "elegante", label: "Elegante", desc: "Serifado refinado, paleta neutra quente e mais espaçamento." },
];

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => el.className = "toast", 2600);
}

async function api(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: opts.body instanceof FormData ? opts.headers : { "Content-Type": "application/json", ...(opts.headers || {}) },
  });
  return res;
}

// ================= AUTH SCREENS =================
function renderAuth() {
  const app = document.getElementById("app");
  const isSignup = state.authMode === "signup";
  const plano = isSignup ? PLANOS_PAGOS[state.pendingPlano] : null;
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="brand"><img src="/logo-mark.svg" alt="Minutei" class="brand-mark" /><span class="brand-word">Minutei</span></div>
        <p class="hint">${isSignup ? "Crie a conta da sua imobiliária" : "Entre na sua conta"}</p>
        ${plano ? `<p class="hint" style="background:var(--brand-soft, #eef4f0);color:var(--brand,#1f6d4c);padding:8px 12px;border-radius:8px;font-weight:600">Plano ${plano.nome} — ${plano.preco}. Depois de criar a conta, você vai para o pagamento.</p>` : ""}
        <form id="authForm">
          ${isSignup ? `
            <div class="field"><label>Nome da imobiliária *</label><input name="imobiliariaNome" required placeholder="Ex.: Imob Gest Imobiliária LTDA" /></div>
            <div class="field"><label>Seu nome</label><input name="nome" placeholder="Nome do responsável" /></div>
          ` : ""}
          <div class="field"><label>E-mail *</label><input name="email" type="email" required /></div>
          <div class="field"><label>Senha *</label><input name="password" type="password" required minlength="8" placeholder="mínimo 8 caracteres" /></div>
          <div class="error-msg" id="authError"></div>
          <button type="submit" class="primary" style="width:100%">${plano ? "Criar conta e ir para pagamento" : (isSignup ? "Criar conta" : "Entrar")}</button>
        </form>
        <div class="auth-switch">
          ${isSignup
            ? `Já tem conta? <button id="toLogin">Entrar</button>`
            : `Ainda não tem conta? <button id="toSignup">Criar conta da imobiliária</button>`}
        </div>
      </div>
    </div>
  `;

  const toLogin = app.querySelector("#toLogin");
  if (toLogin) toLogin.addEventListener("click", () => { state.authMode = "login"; renderAuth(); });
  const toSignup = app.querySelector("#toSignup");
  if (toSignup) toSignup.addEventListener("click", () => { state.authMode = "signup"; renderAuth(); });

  app.querySelector("#authForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = app.querySelector("#authError");
    errEl.textContent = "";
    const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    try {
      const res = await api(isSignup ? "/api/auth/signup" : "/api/auth/login", { method: "POST", body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Erro ao autenticar");
      state.user = data.user;

      if (isSignup && state.pendingPlano) {
        const planoId = state.pendingPlano;
        const checkoutRes = await api("/api/billing/checkout", { method: "POST", body: JSON.stringify({ plano: planoId }) });
        const checkoutData = await checkoutRes.json().catch(() => ({}));
        if (checkoutRes.ok && checkoutData.url) {
          window.location.href = checkoutData.url;
          return;
        }
        toast(checkoutData.error || "Conta criada, mas não foi possível iniciar o pagamento agora. Você pode assinar depois em Configurações.", true);
      }

      await bootstrapApp();
    } catch (err) {
      errEl.textContent = err.message;
    } finally {
      btn.disabled = false;
    }
  });
}

// ================= APP SHELL =================
async function bootstrapApp() {
  await loadTenant();
  await loadTeam();
  renderApp();
}

async function loadTenant() {
  const res = await api("/api/tenant");
  if (res.status === 401) { state.user = null; renderAuth(); return; }
  state.tenant = await res.json();
}
async function loadTeam() {
  const res = await api("/api/team");
  state.team = res.ok ? await res.json() : [];
}

function renderApp() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="brand"><img src="/logo-mark.svg" alt="Minutei" class="brand-mark" /><span class="brand-word">Minutei</span></div>
      <div class="tenant-badge">
        <span>${state.tenant?.nome || ""} · ${state.user?.email || ""}</span>
        <button id="btnLogout">sair</button>
      </div>
    </header>
    <nav>
      <button data-view="dashboard" class="active">Dashboard</button>
      <button data-view="gerar">Gerar contrato</button>
      <button data-view="ia">Ajudante IA</button>
      <button data-view="config">Configurar imobiliária</button>
      <button data-view="equipe">Equipe</button>
    </nav>
    <main>
      <div id="view-dashboard"></div>
      <div id="view-gerar" style="display:none"></div>
      <div id="view-ia" style="display:none"></div>
      <div id="view-config" style="display:none"></div>
      <div id="view-equipe" style="display:none"></div>
    </main>
  `;

  document.querySelectorAll("nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const view = btn.dataset.view;
      document.getElementById("view-dashboard").style.display = view === "dashboard" ? "" : "none";
      document.getElementById("view-gerar").style.display = view === "gerar" ? "" : "none";
      document.getElementById("view-ia").style.display = view === "ia" ? "" : "none";
      document.getElementById("view-config").style.display = view === "config" ? "" : "none";
      document.getElementById("view-equipe").style.display = view === "equipe" ? "" : "none";
      if (view === "dashboard") renderDashboard();
      if (view === "gerar") renderGerar();
      if (view === "ia") renderAjudanteIA();
      if (view === "config") renderConfig();
      if (view === "equipe") renderEquipe();
    });
  });

  document.getElementById("btnLogout").addEventListener("click", async () => {
    await api("/api/auth/logout", { method: "POST" });
    state.user = null; state.tenant = null; state.team = [];
    renderAuth();
  });

  renderDashboard();
}

// ================= DASHBOARD =================
async function renderDashboard() {
  const el = document.getElementById("view-dashboard");
  el.innerHTML = `<div class="card"><div class="empty">Carregando...</div></div>`;
  const res = await api("/api/dashboard");
  if (!res.ok) { el.innerHTML = `<div class="card"><div class="empty">Não foi possível carregar o dashboard.</div></div>`; return; }
  const d = await res.json();

  const fmtBRL = (n) => (n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 });
  const totalUso = d.comercialVsResidencial.comercial + d.comercialVsResidencial.residencial;
  const pctComercial = totalUso ? Math.round((d.comercialVsResidencial.comercial / totalUso) * 100) : 0;
  const pctResidencial = 100 - pctComercial;
  const variacaoMes = d.contratosMesPassado > 0
    ? Math.round(((d.contratosEsteMes - d.contratosMesPassado) / d.contratosMesPassado) * 100)
    : (d.contratosEsteMes > 0 ? 100 : 0);

  if (d.totalContratos === 0) {
    el.innerHTML = `
      <div class="card">
        <h2>Seu dashboard</h2>
        <p class="hint">Assim que você gerar seu primeiro contrato, as métricas aparecem aqui: bairro com mais efetividade, valor médio de venda, comissão recebida e mais.</p>
        <div class="empty">Nenhum contrato gerado ainda.</div>
      </div>
    `;
    return;
  }

  el.innerHTML = `
    <div class="grid cols3" style="margin-bottom:20px">
      <div class="card" style="margin-bottom:0">
        <div class="section-title" style="margin-top:0">Contratos gerados</div>
        <div style="font-family:var(--serif);font-size:28px;font-weight:600">${d.totalContratos}</div>
        <div style="font-size:12.5px;color:var(--muted);margin-top:4px">${d.contratosEsteMes} este mês ${d.contratosMesPassado ? `(${variacaoMes >= 0 ? "+" : ""}${variacaoMes}% vs mês anterior)` : ""}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="section-title" style="margin-top:0">Valor médio de venda</div>
        <div style="font-family:var(--serif);font-size:28px;font-weight:600">${fmtBRL(d.valorMedioVenda)}</div>
        <div style="font-size:12.5px;color:var(--muted);margin-top:4px">${d.porTipo.compra_venda} contrato(s) de compra e venda</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="section-title" style="margin-top:0">Comissão recebida</div>
        <div style="font-family:var(--serif);font-size:28px;font-weight:600">${fmtBRL(d.comissaoTotalRecebida)}</div>
        <div style="font-size:12.5px;color:var(--muted);margin-top:4px">soma de todas as vendas geradas</div>
      </div>
    </div>

    <div class="grid" style="margin-bottom:20px">
      <div class="card" style="margin-bottom:0">
        <h2>Bairro com mais efetividade</h2>
        <p class="hint">Onde você mais fecha contrato.</p>
        ${d.bairroRanking.length ? d.bairroRanking.map((b, i) => `
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:${i === d.bairroRanking.length - 1 ? "0" : "10px"}">
            <span style="width:22px;height:22px;border-radius:50%;background:${i === 0 ? "var(--brand-soft)" : "var(--bg)"};color:${i === 0 ? "var(--brand-dark)" : "var(--muted)"};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${i + 1}</span>
            <span style="flex:1;font-size:14px">${b.bairro}</span>
            <span style="font-size:13px;color:var(--muted);font-weight:600">${b.total} contrato${b.total > 1 ? "s" : ""}</span>
          </div>

          : "Isso remove seu acesso a esta imobiliária. Essa ação não pode ser desfeita."}</p>

        <button type="submit" class="link" ${isOwner && state.team.length > 1 ? "disabled" : ""}>excluir minha conta permanentemente</button>
      </form>
    </div>
  `;

  const deleteForm = el.querySelector("#deleteAccountForm");
  deleteForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = el.querySelector("#deleteAccountError");
    errEl.textContent = "";
    const fd = new FormData(e.target);
    const password = fd.get("password");
    if (!confirm("Tem certeza? Essa ação não pode ser desfeita.")) return;

    state.user = null; state.tenant = null; state.team = [];

    </div>
  `).join("");

  list.querySelectorAll("[data-remove]").forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Remover esse membro da equipe?")) return;
    const res = await api(`/api/team/${b.dataset.remove}`, { method: "DELETE" });
    if (!res.ok) { const d = await res.json().catch(() => ({})); toast(d.error || "Erro ao remover", true); return; }
    await loadTeam();
    renderEquipe();
    toast("Membro removido");
  }));

  const inviteForm = el.querySelector("#inviteForm");
  if (inviteForm) inviteForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = el.querySelector("#inviteError");
    errEl.textContent = "";
    const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    const res = await api("/api/team/invite", { method: "POST", body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || "Erro ao convidar"; return; }
    await loadTeam();
    renderEquipe();
    toast("Corretor(a) adicionado(a)!");
  });
}

function addPersonRow(containerId, prefix, tipoLabel) {
  const container = document.getElementById(containerId);
  const idx = container.children.length;
  container.insertAdjacentHTML("beforeend", pessoaFields(prefix, idx, tipoLabel));
  wireRemoveButtons(container);
  wireCnhUploads(container);
}
function wireRemoveButtons(container) {
  container.querySelectorAll("[data-remove-person]").forEach(b => {
    b.onclick = () => { b.closest(".person-card").remove(); };
  });
}
function wireCnhUploads(container) {
  container.querySelectorAll(".cnh-input").forEach(input => {
    if (input.dataset.wired) return;
    input.dataset.wired = "1";
    input.addEventListener("change", () => handleCnhUpload(input));
  });
}
async function handleCnhUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const card = input.closest(".person-card");
  const btn = input.closest(".cnh-upload-btn");
  const status = card.querySelector(".cnh-status");
  btn.classList.add("loading");
  status.className = "cnh-status";
  status.textContent = "Lendo documento...";

  try {
    const fd = new FormData();
    fd.append("documento", file);
    const res = await api("/api/ia/extrair-documento", { method: "POST", body: fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Não foi possível ler o documento.");

    if (data.nome) card.querySelector('[data-f="nome"]').value = data.nome;
    if (data.cpf) card.querySelector('[data-f="cpf"]').value = data.cpf;
    if (data.rg) card.querySelector('[data-f="rg"]').value = data.rg;
    if (data.nacionalidade) card.querySelector('[data-f="nacionalidade"]').value = data.nacionalidade;

    status.className = "cnh-status success";
    status.textContent = "Dados preenchidos — confira antes de gerar o contrato.";
  } catch (err) {
    status.className = "cnh-status error";
    status.textContent = err.message;
  } finally {
    btn.classList.remove("loading");
    input.value = "";
  }
}
function collectPessoas(containerId) {
  const container = document.getElementById(containerId);

        <div id="fiadorSection" style="display:none">
          <div class="section-title">Fiador(es)</div>
          <div class="row-list" id="fiadores"></div>
          <button type="button" class="secondary" id="btnAddFiador" style="margin-top:10px">+ adicionar</button>
        </div>

        <div id="compraVendaFields">
          <div class="section-title">Valor e pagamento</div>
          <div class="grid">
            <div class="field"><label>Modalidade</label>
              <select name="pagamento.modalidade">
                <option value="a_vista">À vista</option>
                <option value="parcelado">Parcelado (direto)</option>
                <option value="financiado">Financiado (banco)</option>
                <option value="misto">Misto</option>
              </select>
            </div>
            <div class="field"><label>Valor total (R$)</label><input name="valor.total" type="number" step="0.01" /></div>
          </div>
          <div class="field"><label>Valor por extenso (opcional)</label><input name="valor.extenso" placeholder="Ex.: um milhão e seiscentos mil reais" /></div>
          <div id="parcelasContainer" class="row-list"></div>
          <button type="button" class="secondary" id="btnAddParcela" style="margin-top:10px">+ adicionar parcela</button>

          <div class="section-title">Dados bancários (opcional)</div>
          <div class="grid">
            <div class="field"><label>Titular</label><input name="pagamento.dadosBancarios.titular" /></div>
            <div class="field"><label>CPF/CNPJ</label><input name="pagamento.dadosBancarios.cpf" /></div>
            <div class="field"><label>Banco</label><input name="pagamento.dadosBancarios.banco" /></div>
            <div class="field"><label>Tipo de conta</label><input name="pagamento.dadosBancarios.tipo" /></div>
            <div class="field"><label>Agência</label><input name="pagamento.dadosBancarios.agencia" /></div>
            <div class="field"><label>Conta</label><input name="pagamento.dadosBancarios.conta" /></div>
            <div class="field"><label>Chave PIX</label><input name="pagamento.dadosBancarios.pix" /></div>
          </div>

          <div class="section-title">Comissão de corretagem</div>
          <div class="grid">
            <div class="field"><label>Percentual (%)</label><input name="corretagem.percentual" type="number" value="5" /></div>
          </div>
        </div>

        <div id="locacaoFields" style="display:none">
          <div class="section-title">Vigência</div>
          <div class="grid cols3">
            <div class="field"><label>Meses</label><input name="vigencia.meses" type="number" value="30" /></div>
            <div class="field"><label>Início</label><input name="vigencia.inicio" type="date" /></div>
            <div class="field"><label>Fim</label><input name="vigencia.fim" type="date" /></div>
          </div>

          <div class="section-title">Aluguel</div>
          <div class="grid cols3">
            <div class="field"><label>Valor mensal (R$)</label><input name="aluguel.valor" type="number" step="0.01" /></div>
            <div class="field"><label>Dia de vencimento</label><input name="aluguel.diaVencimento" type="number" value="10" /></div>
            <div class="field"><label>Índice de reajuste</label><input name="aluguel.indice" value="IGP-M" /></div>
          </div>

          <div class="section-title">Administração</div>
          <div class="field">
            <label style="display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer">
              <input type="checkbox" name="administracao.ativa" id="chkAdministracao" style="width:auto" />
              Imobiliária administra o imóvel (recebe aluguel, repassa ao locador e presta contas)
            </label>
          </div>
          <div class="grid" id="administracaoFields" style="display:none">
            <div class="field"><label>Taxa de administração (%)</label><input name="administracao.taxaPercentual" type="number" step="0.1" value="10" /></div>
          </div>

          <div class="section-title" id="garantiaTitle">Tipo de garantia</div>
          <div class="grid" id="garantiaTipoField">
            <div class="field">
              <label>Garantia</label>
              <select name="garantiaTipo" id="selGarantiaTipo">
                <option value="caucao">Caução</option>
                <option value="seguro_fianca">Seguro Fiança</option>
                <option value="titulo_capitalizacao">Título de Capitalização</option>
                <option value="personalizada">Outra (cláusula específica da imobiliária)</option>
              </select>
            </div>
          </div>
          <div class="grid" id="garantiaFieldsCaucao">
            <div class="field"><label>Valor da caução (R$)</label><input name="garantia.valor" type="number" step="0.01" /></div>
          </div>
          <div class="grid" id="garantiaFieldsSeguro" style="display:none">
            <div class="field"><label>Seguradora</label><input name="garantia.seguradora" /></div>
            <div class="field"><label>Nº da apólice</label><input name="garantia.apolice" /></div>
          </div>
          <div class="grid" id="garantiaFieldsTitulo" style="display:none">
            <div class="field"><label>Instituição emissora</label><input name="garantia.instituicao" /></div>
            <div class="field"><label>Número do título</label><input name="garantia.numero" /></div>
            <div class="field"><label>Valor (R$)</label><input name="garantia.valorTitulo" type="number" step="0.01" /></div>
          </div>
          <div class="field" id="garantiaFieldsPersonalizada" style="display:none">
            <label>Texto da cláusula de garantia</label>
            <textarea name="garantia.descricao" rows="3" placeholder="Cole aqui a cláusula específica de garantia que a imobiliária utiliza."></textarea>
          </div>

          <div class="section-title">Comissão de corretagem (opcional)</div>
          <div class="grid cols3">
            <div class="field"><label>Percentual (%)</label><input name="corretagem.percentual" type="number" step="0.1" placeholder="Ex.: 100" /></div>
            <div class="field"><label>Sobre quantos aluguéis</label><input name="corretagem.quantidadeAlugueis" type="number" value="1" min="1" /></div>
          </div>
        </div>

        <div class="section-title">Entrega de chaves</div>
        <div class="grid">
          <div class="field"><label>Modo</label>
            <select name="entregaChaves.modo">
              <option value="na_assinatura">Na assinatura</option>
              <option value="ultima_parcela">Condicionada à última parcela</option>
              <option value="data_fixa">Data fixa</option>
            </select>
          </div>
          <div class="field"><label>Data</label><input name="entregaChaves.data" type="date" /></div>
        </div>

        <div class="section-title">Cláusula especial (opcional)</div>
        <div class="field">
          <label>Condições específicas deste contrato</label>
          <textarea name="clausulaEspecial" rows="4" placeholder="Ex.: O imóvel será entregue com os móveis planejados descritos no laudo de vistoria anexo. Animais de estimação de pequeno porte autorizados mediante comunicação prévia ao locador."></textarea>
        </div>

        <div class="section-title">Assinatura</div>
        <div class="grid">
          <div class="field"><label>Data do contrato</label><input name="data" type="date" /></div>
          <div class="field"><label>Foro (opcional, usa o padrão se vazio)</label><input name="foro" /></div>
        </div>

        <div class="footer-actions" style="margin-top:20px">
          <button type="submit" class="secondary" data-formato="docx">Gerar .docx (editável)</button>
          <button type="submit" class="primary" data-formato="pdf">Gerar .pdf (pronto p/ assinatura)</button>
        </div>
      </form>
    </div>
  `;

  document.querySelectorAll("[data-tipo]").forEach(b => b.addEventListener("click", () => {
    state.tipo = b.dataset.tipo;
    renderGerar();
  }));
  document.querySelectorAll("[data-layout]").forEach(b => b.addEventListener("click", () => {
    state.layout = b.dataset.layout;
    renderGerar();
  }));

  const isLocacao = state.tipo !== "compra_venda";
  el.querySelector("#compraVendaFields").style.display = isLocacao ? "none" : "";
  el.querySelector("#locacaoFields").style.display = isLocacao ? "" : "none";
  el.querySelector("#descricaoRegistroField").style.display = isLocacao ? "none" : "";
  el.querySelector("#fiadorSection").style.display = state.tipo === "locacao_fiador" ? "" : "none";
  el.querySelector("#labelVendedores").textContent = isLocacao ? "Locador(es)" : "Vendedor(es)";
  el.querySelector("#labelCompradores").textContent = isLocacao ? "Locatário(s)" : "Comprador(es)";
  if (state.tipo === "locacao_fiador") {
    el.querySelector("#garantiaTitle").textContent = "Garantia (fiador — ver seção acima)";
    el.querySelector("#garantiaTipoField").style.display = "none";
    el.querySelector("#garantiaFieldsCaucao").style.display = "none";
  } else if (isLocacao) {
    const selGarantia = el.querySelector("#selGarantiaTipo");
    const garantiaBlocos = {
      caucao: el.querySelector("#garantiaFieldsCaucao"),
      seguro_fianca: el.querySelector("#garantiaFieldsSeguro"),
      titulo_capitalizacao: el.querySelector("#garantiaFieldsTitulo"),
      personalizada: el.querySelector("#garantiaFieldsPersonalizada"),
    };
    selGarantia.addEventListener("change", () => {
      Object.entries(garantiaBlocos).forEach(([tipo, bloco]) => { bloco.style.display = tipo === selGarantia.value ? "" : "none"; });
    });
    const chkAdmin = el.querySelector("#chkAdministracao");
    chkAdmin.addEventListener("change", () => {
      el.querySelector("#administracaoFields").style.display = chkAdmin.checked ? "" : "none";
    });
  }

  addPersonRow("vendedores", "vend", isLocacao ? "Locador" : "Vendedor");
  addPersonRow("compradores", "comp", isLocacao ? "Locatário" : "Comprador");
  if (state.tipo === "locacao_fiador") addPersonRow("fiadores", "fiad", "Fiador");
  if (!isLocacao) addParcelaRow();

  el.querySelector("#btnAddVendedor").addEventListener("click", () => addPersonRow("vendedores", "vend", isLocacao ? "Locador" : "Vendedor"));
  el.querySelector("#btnAddComprador").addEventListener("click", () => addPersonRow("compradores", "comp", isLocacao ? "Locatário" : "Comprador"));
  const btnAddFiador = el.querySelector("#btnAddFiador");
  if (btnAddFiador) btnAddFiador.addEventListener("click", () => addPersonRow("fiadores", "fiad", "Fiador"));
  const btnAddParcela = el.querySelector("#btnAddParcela");
  if (btnAddParcela) btnAddParcela.addEventListener("click", addParcelaRow);

  el.querySelector("#contratoForm").addEventListener("submit", handleSubmit);
}

// ================= AJUDANTE IA DE CLÁUSULAS =================
const RISCO_LABEL = { baixo: "Risco baixo", medio: "Risco médio", alto: "Risco alto" };

function renderAjudanteIA() {
  const el = document.getElementById("view-ia");
  el.innerHTML = `
    <div class="card">
      <h2>Ajudante IA de cláusulas</h2>
      <p style="color:var(--muted);font-size:14px;margin-top:6px;max-width:640px">
        Descreva o pedido de alteração que uma das partes fez sobre o contrato. A IA avalia o risco
        e já redige um texto pronto pra colar no campo "Cláusula especial" na hora de gerar o documento.
      </p>

      <form id="iaForm" style="margin-top:20px">
        <div class="field">
          <label>Tipo de contrato</label>
          <select name="tipoContrato">
            <option value="compra_venda" ${state.tipo === "compra_venda" ? "selected" : ""}>Compra e Venda</option>
            <option value="locacao_caucao" ${state.tipo !== "compra_venda" ? "selected" : ""}>Locação</option>
          </select>
        </div>
        <div class="field">
          <label>Cláusula ou contexto atual (opcional)</label>
          <textarea name="clausulaAtual" rows="3" placeholder="Ex.: Cláusula de entrega das chaves condicionada ao pagamento da última parcela."></textarea>
        </div>
        <div class="field">
          <label>O que a parte pediu *</label>
          <textarea name="pedido" rows="4" required placeholder="Ex.: O comprador pediu para trocar a multa por atraso de 2% para 1% ao mês."></textarea>
        </div>
        <div class="footer-actions">
          <button type="submit" class="primary">Analisar com IA</button>
        </div>
      </form>

      <div id="iaResultado"></div>
    </div>
  `;

  el.querySelector("#iaForm").addEventListener("submit", handleIaSubmit);
}

async function handleIaSubmit(e) {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const body = {
    tipoContrato: getByPath(fd, "tipoContrato"),
    clausulaAtual: getByPath(fd, "clausulaAtual"),
    pedido: getByPath(fd, "pedido"),
  };
  const btn = form.querySelector('button[type="submit"]');
  const resultadoEl = document.getElementById("iaResultado");
  btn.disabled = true;
  btn.textContent = "Analisando...";
  resultadoEl.innerHTML = "";

  try {
    const res = await api("/api/ia/clausula", { method: "POST", body: JSON.stringify(body) });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Não foi possível analisar o pedido.");

    resultadoEl.innerHTML = `
      <div class="ia-resultado">
        <span class="risk-badge risk-${data.risco}">${RISCO_LABEL[data.risco] || data.risco}</span>
        <h3>Por quê</h3>
        <p class="ia-justificativa">${(data.justificativa || "").replace(/</g, "&lt;")}</p>
        <h3>Texto sugerido para a cláusula especial</h3>
        <div class="ia-texto-sugerido" id="iaTextoSugerido">${(data.textoSugerido || "").replace(/</g, "&lt;")}</div>
        <div class="footer-actions" style="margin-top:12px">
          <button type="button" class="secondary" id="btnCopiarIa">Copiar texto</button>
        </div>
        <p class="ia-disclaimer">Sugestão gerada por IA — não substitui análise jurídica formal. Revise o texto antes de usá-lo em um contrato real, especialmente em pedidos de risco médio ou alto.</p>
      </div>
    `;
    document.getElementById("btnCopiarIa").addEventListener("click", async () => {
      await navigator.clipboard.writeText(data.textoSugerido || "");
      toast("Texto copiado!");
    });
  } catch (err) {
    resultadoEl.innerHTML = `<div class="ia-resultado"><p class="ia-justificativa" style="color:#b43d2f">${err.message}</p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Analisar com IA";
  }
}

function getByPath(fd, name) {
  return fd.get(name) || "";
}

async function handleSubmit(e) {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);

  const dados = { tipo: state.tipo, layout: state.layout };
  dados.data = getByPath(fd, "data");
  dados.foro = getByPath(fd, "foro");
  dados.imovel = {
    endereco: getByPath(fd, "imovel.endereco"),
    matricula: getByPath(fd, "imovel.matricula"),
    caracteristicas: getByPath(fd, "imovel.caracteristicas"),
    descricaoRegistro: getByPath(fd, "imovel.descricaoRegistro"),
    bairro: getByPath(fd, "imovel.bairro"),
    tipoUso: getByPath(fd, "imovel.tipoUso") || "residencial",
  };
  dados.entregaChaves = { modo: getByPath(fd, "entregaChaves.modo"), data: getByPath(fd, "entregaChaves.data") };
  dados.clausulaEspecial = getByPath(fd, "clausulaEspecial");

  const isLocacao = state.tipo !== "compra_venda";
  const vendedores = collectPessoas("vendedores");
  const compradores = collectPessoas("compradores");

  if (isLocacao) {
    dados.locadores = vendedores;
    dados.locatarios = compradores;
    if (state.tipo === "locacao_fiador") dados.fiadores = collectPessoas("fiadores");
    dados.vigencia = { meses: getByPath(fd, "vigencia.meses"), inicio: getByPath(fd, "vigencia.inicio"), fim: getByPath(fd, "vigencia.fim") };
    dados.aluguel = { valor: parseFloat(getByPath(fd, "aluguel.valor") || 0), diaVencimento: getByPath(fd, "aluguel.diaVencimento"), indice: getByPath(fd, "aluguel.indice") };

    dados.administracao = { ativa: fd.get("administracao.ativa") === "on", taxaPercentual: parseFloat(getByPath(fd, "administracao.taxaPercentual") || 0) };

    const garantiaTipo = state.tipo === "locacao_fiador" ? "fiador" : (getByPath(fd, "garantiaTipo") || "caucao");
    dados.garantiaTipo = garantiaTipo;
    if (garantiaTipo === "seguro_fianca") dados.garantia = { seguradora: getByPath(fd, "garantia.seguradora"), apolice: getByPath(fd, "garantia.apolice") };
    else if (garantiaTipo === "titulo_capitalizacao") dados.garantia = { instituicao: getByPath(fd, "garantia.instituicao"), numero: getByPath(fd, "garantia.numero"), valor: parseFloat(getByPath(fd, "garantia.valorTitulo") || 0) };
    else if (garantiaTipo === "personalizada") dados.garantia = { descricao: getByPath(fd, "garantia.descricao") };
    else if (garantiaTipo === "caucao") dados.garantia = { valor: parseFloat(getByPath(fd, "garantia.valor") || 0) };

    const corretPercentualLoc = getByPath(fd, "corretagem.percentual");
    if (corretPercentualLoc !== "") {
      dados.corretagem = { percentual: parseFloat(corretPercentualLoc), quantidadeAlugueis: parseInt(getByPath(fd, "corretagem.quantidadeAlugueis") || "1", 10) };
    }
    dados.uso = "residencial";
  } else {
    dados.vendedores = vendedores;
    dados.compradores = compradores;
    const parcelas = collectParcelas();
    dados.pagamento = {
      modalidade: getByPath(fd, "pagamento.modalidade"),
      parcelas,
      dadosBancarios: {
        titular: getByPath(fd, "pagamento.dadosBancarios.titular"),
        cpf: getByPath(fd, "pagamento.dadosBancarios.cpf"),
        banco: getByPath(fd, "pagamento.dadosBancarios.banco"),
        tipo: getByPath(fd, "pagamento.dadosBancarios.tipo"),
        agencia: getByPath(fd, "pagamento.dadosBancarios.agencia"),
        conta: getByPath(fd, "pagamento.dadosBancarios.conta"),
        pix: getByPath(fd, "pagamento.dadosBancarios.pix"),
      },
    };
    const valorTotalInput = parseFloat(getByPath(fd, "valor.total") || 0);
    const valorTotal = valorTotalInput || parcelas.reduce((a, p) => a + (p.valor || 0), 0);
    dados.valor = { total: valorTotal, extenso: getByPath(fd, "valor.extenso") };
    dados.corretagem = { percentual: parseFloat(getByPath(fd, "corretagem.percentual") || 5) };
  }

  const formato = (e.submitter && e.submitter.dataset.formato) || "docx";
  const buttons = form.querySelectorAll('button[type="submit"]');
  const btn = e.submitter;
  const originalText = btn.textContent;
  buttons.forEach(b => b.disabled = true);
  btn.textContent = formato === "pdf" ? "Gerando PDF..." : "Gerando...";
  try {
    const res = await api("/api/gerar", { method: "POST", body: JSON.stringify({ dados, formato }) });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "Erro ao gerar contrato");
    }
    const blob = await res.blob();
    const disposition = res.headers.get("Content-Disposition") || "";
    const match = /filename="(.+?)"/.exec(disposition);
    const filename = match ? match[1] : `contrato.${formato}`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Contrato gerado com sucesso!");
    await loadTenant();
    renderGerar();
  } catch (err) {
    toast(err.message, true);
  } finally {
    buttons.forEach(b => b.disabled = false);
    btn.textContent = originalText;
  }
}

(async function init() {
  if (window.location.hash === "#signup") state.authMode = "signup";
  const planoParam = new URLSearchParams(window.location.search).get("plano");
  if (PLANOS_PAGOS[planoParam]) state.pendingPlano = planoParam;
  const res = await api("/api/auth/me");
  if (res.ok) {
    const data = await res.json();
    state.user = data.user;
    await bootstrapApp();
  } else {
    renderAuth();
  }
})();
</script>
